<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta name="description" content="Leeza Travels - Discover breathtaking destinations worldwide." />
  <title>Leeza Travels | Explore The World</title>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      font-family: 'Outfit', sans-serif
    }

    .hero-bg {
      position: relative;
      overflow: hidden;
    }

    .hero-slider {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      animation: heroSlide 25s infinite;
    }

    .hero-slide:nth-child(1) {
      background-image: url('images/sigiriya.jpg');
      animation-delay: 0s;
    }

    .hero-slide:nth-child(2) {
      background-image: url('images/ella.jpg');
      animation-delay: 5s;
    }

    .hero-slide:nth-child(3) {
      background-image: url('images/mirissa.jpg');
      animation-delay: 10s;
    }

    .hero-slide:nth-child(4) {
      background-image: url('images/kandy.jpg');
      animation-delay: 15s;
    }

    .hero-slide:nth-child(5) {
      background-image: url('images/nuwara_eliya.jpg');
      animation-delay: 20s;
    }

    @keyframes heroSlide {

      0%,
      19.999% {
        opacity: 1;
        z-index: 10;
        transform: scale(1.05);
      }

      20%,
      100% {
        opacity: 0;
        z-index: 0;
        transform: scale(1);
      }
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.55) 100%);
      z-index: 1;
    }

    .glass {
      background: rgba(255, 255, 255, .08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, .15)
    }

    .glass-dark {
      background: rgba(15, 23, 42, .7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, .1)
    }

    .gtext {
      color: #FF6B35;
      background: none;
      -webkit-text-fill-color: initial;
    }

    .card {
      transition: all .35s ease
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(14, 165, 233, .25)
    }

    .dest-img {
      transition: transform .5s ease
    }

    .dest-card:hover .dest-img {
      transform: scale(1.08)
    }

    .dest-overlay {
      background: linear-gradient(to top, rgba(15, 23, 42, .9) 0%, transparent 60%)
    }

    .nl::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: #FF6B35;
      transition: width .3s
    }

    .nl:hover::after {
      width: 100%
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px
    }

    ::-webkit-scrollbar-track {
      background: #1a1a24
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569
    }

    body {
      background-color: #1a1a24;
      color: white;
    }

    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(calc(-350px * 6 - 1.5rem * 6));
      }
    }

    .scrolling-wrapper {
      display: flex;
      width: max-content;
      animation: scroll 40s linear infinite;
    }

    .toast {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translate(-50%, -5rem);
      z-index: 100000;
      padding: 1rem 2rem;
      border-radius: 99px;
      color: #fff;
      font-weight: 700;
      font-size: 0.875rem;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
      min-width: 300px;
      justify-content: center;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .nav-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: #ef4444;
      color: white;
      font-size: 9px;
      font-weight: 800;
      min-width: 16px;
      height: 16px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid #0f172a;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
    }

    .user-badge {
      background: #0ea5e9;
      box-shadow: 0 2px 6px rgba(14, 165, 233, 0.4);
    }

    /* ── Language Selector ─────────────────────────────── */
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 99px;
      padding: 8px 14px;
      cursor: pointer;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .lang-btn:hover {
      background: rgba(255, 107, 53, 0.15);
      border-color: rgba(255, 107, 53, 0.4);
    }

    .lang-btn .lang-chevron {
      font-size: 10px;
      opacity: 0.6;
      transition: transform 0.3s ease;
    }

    .lang-btn.open .lang-chevron {
      transform: rotate(180deg);
    }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 220px;
      background: rgba(15, 20, 40, 0.95);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 107, 53, 0.08);
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
      transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 9999;
    }

    .lang-dropdown.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .lang-dropdown-header {
      padding: 12px 16px 8px;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      transition: background 0.15s ease;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }

    .lang-item:hover {
      background: rgba(255, 107, 53, 0.12);
      color: #fff;
    }

    .lang-item.active {
      color: #FF6B35;
      background: rgba(255, 107, 53, 0.1);
    }

    .lang-item .lang-flag {
      font-size: 18px;
      line-height: 1;
    }

    .lang-item .lang-native {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      margin-left: auto;
    }
